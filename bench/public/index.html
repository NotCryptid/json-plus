<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JSON Plus benchmark</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
  h1 { font-size: 1.4rem; }
  p.sub { color: #666; margin-top: -8px; }
  .controls { display: flex; gap: 12px; align-items: center; margin: 20px 0; flex-wrap: wrap; }
  label { font-size: 0.9rem; color: #444; }
  input { width: 90px; padding: 4px 6px; }
  button { padding: 8px 16px; border: 0; border-radius: 6px; background: #2563eb; color: white; font-weight: 600; cursor: pointer; }
  button:disabled { background: #aac; cursor: wait; }
  button.secondary { background: #6b7280; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 0.92rem; }
  th { color: #555; font-weight: 600; }
  .bar-row td:last-child { width: 50%; }
  .bar { height: 14px; border-radius: 3px; background: #2563eb; }
  .bar.plain { background: #9ca3af; }
  .winner { color: #16a34a; font-weight: 700; }
  #status { color: #666; font-size: 0.9rem; min-height: 1.2em; }
</style>
</head>
<body>
  <h1>JSON Plus benchmark</h1>
  <p class="sub">Plain JSON.parse() + linear scan vs. JSON Plus's cached sqlite store + indexed lookup.</p>

  <div class="controls">
    <label>Lookups <input id="lookups" type="number" value="2000" min="1" max="100000" /></label>
    <button id="run">Run benchmark (warm cache)</button>
    <button id="runCold" class="secondary">Run benchmark (force rebuild)</button>
  </div>
  <div id="status"></div>

  <table id="results" style="display:none">
    <thead>
      <tr><th>Stage</th><th>Plain JSON (ms)</th><th>Raw SQLite (ms)</th><th>JSON Plus (ms)</th><th></th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
